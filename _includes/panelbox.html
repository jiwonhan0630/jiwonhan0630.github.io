<article class="panelbox">
    <div class="panelbox-title">{{ include.title }}</div>
    <div class="panelbox-item">
        {% if include.file %}
            {% capture mdown %}{% include {{ include.file }} %}{% endcapture %}
            {{ mdown | markdownify }}
        {% else %}
            {{ include.content | markdownify }}
        {% endif %}
    </div>
</article>
